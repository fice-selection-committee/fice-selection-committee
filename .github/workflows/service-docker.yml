name: Build & Push Service Images

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'server/services/**'
      - 'server/libs/**'
      - 'server/buildSrc/**'
      - 'server/build.gradle.kts'
      - 'server/settings.gradle.kts'
      - 'server/version.properties'
      - 'client/web/**'
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build-matrix.outputs.matrix }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')
        uses: dorny/paths-filter@v3
        with:
          filters: |
            gateway:
              - 'server/services/selection-committee-gateway/**'
            identity:
              - 'server/services/selection-committee-identity-service/**'
            admission:
              - 'server/services/selection-committee-admission-service/**'
            documents:
              - 'server/services/selection-committee-documents-service/**'
            environment:
              - 'server/services/selection-committee-environment-service/**'
            notifications:
              - 'server/services/selection-committee-notifications-service/**'
            telegram-bot:
              - 'server/services/selection-committee-telegram-bot-service/**'
            web:
              - 'client/web/**'
            shared:
              - 'server/libs/**'
              - 'server/buildSrc/**'
              - 'server/build.gradle.kts'
              - 'server/settings.gradle.kts'
              - 'server/version.properties'

      - name: Build service matrix
        id: build-matrix
        run: |
          # Build all services on: workflow_dispatch, tag push, or shared lib changes
          IS_TAG='${{ startsWith(github.ref, 'refs/tags/') }}'
          ALL='${{ github.event_name == 'workflow_dispatch' || steps.filter.outputs.shared == 'true' }}'
          if [ "$IS_TAG" = "true" ]; then ALL="true"; fi

          services='[]'
          add() {
            services=$(echo "$services" | jq -c --arg s "$1" --arg n "$2" '. + [{"service": $s, "short-name": $n}]')
          }

          if [ "$ALL" = "true" ] || [ "${{ steps.filter.outputs.gateway }}" = "true" ]; then
            add "selection-committee-gateway" "gateway"
          fi
          if [ "$ALL" = "true" ] || [ "${{ steps.filter.outputs.identity }}" = "true" ]; then
            add "selection-committee-identity-service" "identity"
          fi
          if [ "$ALL" = "true" ] || [ "${{ steps.filter.outputs.admission }}" = "true" ]; then
            add "selection-committee-admission-service" "admission"
          fi
          if [ "$ALL" = "true" ] || [ "${{ steps.filter.outputs.documents }}" = "true" ]; then
            add "selection-committee-documents-service" "documents"
          fi
          if [ "$ALL" = "true" ] || [ "${{ steps.filter.outputs.environment }}" = "true" ]; then
            add "selection-committee-environment-service" "environment"
          fi
          if [ "$ALL" = "true" ] || [ "${{ steps.filter.outputs.notifications }}" = "true" ]; then
            add "selection-committee-notifications-service" "notifications"
          fi
          if [ "$ALL" = "true" ] || [ "${{ steps.filter.outputs.telegram-bot }}" = "true" ]; then
            add "selection-committee-telegram-bot-service" "telegram-bot"
          fi
          if [ "$ALL" = "true" ] || [ "${{ steps.filter.outputs.web }}" = "true" ]; then
            add "web" "web"
          fi

          echo "matrix={\"include\":$services}" >> "$GITHUB_OUTPUT"
          echo "Selected services: $services"

  build-and-push:
    name: Build & Push (${{ matrix.service }})
    needs: detect-changes
    if: needs.detect-changes.outputs.matrix != '{"include":[]}'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.detect-changes.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Dockerfile availability
        id: check-source
        run: |
          if [ "${{ matrix.service }}" = "web" ]; then
            # Web frontend has a different directory structure
            if [ -f "client/web/docker/Dockerfile" ]; then
              echo "buildable=true" >> "$GITHUB_OUTPUT"
              echo "context=client/web" >> "$GITHUB_OUTPUT"
              echo "dockerfile=client/web/docker/Dockerfile" >> "$GITHUB_OUTPUT"
            else
              echo "buildable=false" >> "$GITHUB_OUTPUT"
            fi
          elif [ -f "server/services/${{ matrix.service }}/Dockerfile" ] && \
               [ -d "server/services/${{ matrix.service }}/src/main" ]; then
            echo "buildable=true" >> "$GITHUB_OUTPUT"
            echo "context=server" >> "$GITHUB_OUTPUT"
            echo "dockerfile=server/services/${{ matrix.service }}/Dockerfile" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::Skipping ${{ matrix.service }} — Dockerfile or source code not in monorepo"
            echo "buildable=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Docker Buildx
        if: steps.check-source.outputs.buildable == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: steps.check-source.outputs.buildable == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        if: steps.check-source.outputs.buildable == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/sc-${{ matrix.short-name }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        if: steps.check-source.outputs.buildable == 'true'
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ${{ steps.check-source.outputs.context }}
          file: ${{ steps.check-source.outputs.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        if: steps.check-source.outputs.buildable == 'true'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/sc-${{ matrix.short-name }}:latest
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Upload Trivy scan results
        if: steps.check-source.outputs.buildable == 'true' && always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
