name: Build & Push Service Images

on:
  push:
    branches: [main]
    paths:
      - 'server/services/**'

permissions:
  contents: read
  packages: write

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      gateway: ${{ steps.filter.outputs.gateway }}
      identity: ${{ steps.filter.outputs.identity }}
      admission: ${{ steps.filter.outputs.admission }}
      documents: ${{ steps.filter.outputs.documents }}
      environment: ${{ steps.filter.outputs.environment }}
      notifications: ${{ steps.filter.outputs.notifications }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            gateway:
              - 'server/services/selection-committee-gateway/**'
            identity:
              - 'server/services/selection-committee-identity-service/**'
            admission:
              - 'server/services/selection-committee-admission-service/**'
            documents:
              - 'server/services/selection-committee-documents-service/**'
            environment:
              - 'server/services/selection-committee-environment-service/**'
            notifications:
              - 'server/services/selection-committee-notifications-service/**'

  build-and-push:
    name: Build & Push (${{ matrix.service }})
    needs: detect-changes
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: selection-committee-gateway
            short-name: gateway
            filter: gateway
          - service: selection-committee-identity-service
            short-name: identity
            filter: identity
          - service: selection-committee-admission-service
            short-name: admission
            filter: admission
          - service: selection-committee-documents-service
            short-name: documents
            filter: documents
          - service: selection-committee-environment-service
            short-name: environment
            filter: environment
          - service: selection-committee-notifications-service
            short-name: notifications
            filter: notifications

    if: needs.detect-changes.outputs[matrix.filter] == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/sc-${{ matrix.short-name }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: server/services/${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
