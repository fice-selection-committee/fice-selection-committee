name: Services CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'server/services/**'
  push:
    branches: [main]
    paths:
      - 'server/services/**'

concurrency:
  group: services-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: "Build ${{ matrix.service }}"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        service:
          - selection-committee-admission-service
          - selection-committee-documents-service
          - selection-committee-environment-service
          - selection-committee-gateway
          - selection-committee-identity-service
          - selection-committee-notifications-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build & Test
        working-directory: server/services/${{ matrix.service }}
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew build --no-daemon

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ matrix.service }}
          path: server/services/${{ matrix.service }}/build/reports/
          retention-days: 7
          if-no-files-found: ignore
