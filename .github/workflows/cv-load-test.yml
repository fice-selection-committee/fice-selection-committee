name: CV Load Test

# Nightly load validation for FLOW-07 / UC-02 (STEP-13). Brings up the full
# Docker stack, runs the k6 cv-pipeline scenario for ~6 minutes, and records
# the result. Fails when any of the SLO thresholds is missed:
#
#   * iteration_duration p(95) < 5s
#   * cv_queue_lag max < 60 messages
#   * cv_processing_seconds p(95) < 5s
#   * cv_dlq_depth max == 0
#   * http_req_failed rate < 2%
#
# The polyrepos (cv-service, documents-service, infra, e2e-tests, gateway,
# identity-service, ...) are gitignored from the monorepo. The job clones them
# into the expected paths via a GitHub fine-grained PAT exposed as
# `secrets.SC_BOT_TOKEN`. If the secret is unset (e.g. on a fork), the
# polyrepo clones are skipped and the job exits early with a friendly notice
# rather than a red X.
#
# Schedule: nightly @ 02:00 UTC + workflow_dispatch for ad-hoc runs.

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

concurrency:
  group: cv-load-test-${{ github.ref }}
  cancel-in-progress: false

jobs:
  load:
    name: k6 cv-pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      SC_BOT_TOKEN: ${{ secrets.SC_BOT_TOKEN }}

    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v4

      - name: Verify polyrepo bot token
        id: token
        run: |
          if [ -z "$SC_BOT_TOKEN" ]; then
            echo "::warning::SC_BOT_TOKEN secret is not set — polyrepo clones will be skipped, the load run will exit early."
            echo "have_token=false" >> "$GITHUB_OUTPUT"
          else
            echo "have_token=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Clone cv-service polyrepo
        if: steps.token.outputs.have_token == 'true'
        uses: actions/checkout@v4
        with:
          repository: fice-selection-committee/selection-committee-computer-vision
          ref: main
          token: ${{ secrets.SC_BOT_TOKEN }}
          path: server/services/selection-committee-computer-vision

      - name: Clone documents-service polyrepo
        if: steps.token.outputs.have_token == 'true'
        uses: actions/checkout@v4
        with:
          repository: fice-selection-committee/selection-committee-documents-service
          ref: develop
          token: ${{ secrets.SC_BOT_TOKEN }}
          path: server/services/selection-committee-documents-service

      - name: Clone e2e-tests polyrepo (load scripts)
        if: steps.token.outputs.have_token == 'true'
        uses: actions/checkout@v4
        with:
          repository: fice-selection-committee/selection-committee-e2e-tests
          ref: develop
          token: ${{ secrets.SC_BOT_TOKEN }}
          path: server/services/selection-committee-e2e-tests

      - name: Clone infra polyrepo
        if: steps.token.outputs.have_token == 'true'
        uses: actions/checkout@v4
        with:
          repository: fice-selection-committee/selection-committee-infra
          ref: master
          token: ${{ secrets.SC_BOT_TOKEN }}
          path: infra

      # docker-compose.services.yml builds 6 additional Java services + the
      # Next.js frontend from source. Missing any one of them fails compose
      # at the `lstat` step before container creation.
      - name: Clone identity-service polyrepo
        if: steps.token.outputs.have_token == 'true'
        uses: actions/checkout@v4
        with:
          repository: fice-selection-committee/selection-committee-identity-service
          ref: develop
          token: ${{ secrets.SC_BOT_TOKEN }}
          path: server/services/selection-committee-identity-service

      - name: Clone environment-service polyrepo
        if: steps.token.outputs.have_token == 'true'
        uses: actions/checkout@v4
        with:
          repository: fice-selection-committee/selection-committee-environment-service
          ref: develop
          token: ${{ secrets.SC_BOT_TOKEN }}
          path: server/services/selection-committee-environment-service

      - name: Clone admission-service polyrepo
        if: steps.token.outputs.have_token == 'true'
        uses: actions/checkout@v4
        with:
          repository: fice-selection-committee/selection-committee-admission-service
          ref: develop
          token: ${{ secrets.SC_BOT_TOKEN }}
          path: server/services/selection-committee-admission-service

      - name: Clone notifications-service polyrepo
        if: steps.token.outputs.have_token == 'true'
        uses: actions/checkout@v4
        with:
          repository: fice-selection-committee/selection-committee-notifications-service
          ref: develop
          token: ${{ secrets.SC_BOT_TOKEN }}
          path: server/services/selection-committee-notifications-service

      - name: Clone gateway polyrepo
        if: steps.token.outputs.have_token == 'true'
        uses: actions/checkout@v4
        with:
          repository: fice-selection-committee/selection-committee-gateway
          ref: develop
          token: ${{ secrets.SC_BOT_TOKEN }}
          path: server/services/selection-committee-gateway

      - name: Clone telegram-bot-service polyrepo
        if: steps.token.outputs.have_token == 'true'
        uses: actions/checkout@v4
        with:
          repository: fice-selection-committee/selection-committee-telegram-bot-service
          ref: develop
          token: ${{ secrets.SC_BOT_TOKEN }}
          path: server/services/selection-committee-telegram-bot-service

      - name: Clone web polyrepo
        if: steps.token.outputs.have_token == 'true'
        uses: actions/checkout@v4
        with:
          repository: fice-selection-committee/selection-committee-web
          ref: develop
          token: ${{ secrets.SC_BOT_TOKEN }}
          path: client/web

      - name: Set up Docker Buildx
        if: steps.token.outputs.have_token == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Provision .env from .env.example
        if: steps.token.outputs.have_token == 'true'
        working-directory: infra
        run: |
          # Compose interpolates ${VAR} from a local .env in the working directory.
          # Without this, COMPOSE_PROJECT_NAME / POSTGRES_* / RABBIT_* / MINIO_*
          # all evaluate to empty and `docker compose up` fails with
          # "project name must not be empty".
          if [ ! -f .env ]; then
            cp .env.example .env
            echo "Provisioned infra/.env from .env.example"
          fi

      - name: Generate rabbitmq/definitions.json with hashed password
        if: steps.token.outputs.have_token == 'true'
        working-directory: infra
        run: |
          # rabbitmq/definitions.json is gitignored (it contains the SHA256-salted
          # password hash for the scrabbit user). The compose RABBITMQ_SERVER_
          # ADDITIONAL_ERL_ARGS bind-mounts that file as a load-on-startup arg, so
          # if it's missing rabbitmq half-initializes (no users created) and AMQP
          # clients see ACCESS_REFUSED. Generate it from .example by computing
          # rabbit_password_hashing_sha256 = base64(salt || sha256(salt || pwd))
          # for the configured ${RABBIT_PASS}.
          set -a; . ./.env; set +a
          HASH=$(python3 - <<'PYEOF'
          import hashlib, base64, secrets, os
          pwd = os.environ['RABBIT_PASS'].encode()
          salt = secrets.token_bytes(4)
          print(base64.b64encode(salt + hashlib.sha256(salt + pwd).digest()).decode())
          PYEOF
          )
          # Use a non-/ delimiter for sed because the hash may contain /
          sed "s|<< REPLACE_WITH_PASSWORD_HASH >>|${HASH}|" \
            rabbitmq/definitions.example.json > rabbitmq/definitions.json
          echo "Generated rabbitmq/definitions.json with hash for user '${RABBIT_USER}'"

      - name: Rewrite postgres/init/01-create-dbs.sql for CI
        if: steps.token.outputs.have_token == 'true'
        working-directory: infra
        run: |
          # The committed 01-create-dbs.sql uses :ID_USER style placeholders that
          # postgres' docker-entrypoint-initdb.d does NOT substitute (psql -v vars
          # aren't passed). The bootstrap PowerShell rewrites this file at local
          # setup time; CI needs the same.
          #
          # Per audit of every service's application.yml on develop:
          #   - identity / environment / admission / documents / telegram-bot
          #     all use ${POSTGRES_DB} (= selection-committee) with ${POSTGRES_USER}
          #     (= scadmin) — those credentials are created by the postgres
          #     entrypoint from RABBITMQ_DEFAULT_USER/PASS env vars, no extra DDL needed.
          #   - notifications uses sc_notifications / scnotifications — needs creation.
          #   - gateway has no datasource.
          cat > postgres/init/01-create-dbs.sql <<'SQL'
          -- Notifications service has its own DB + user.
          -- Other services share the admin DB created by the postgres entrypoint.
          CREATE USER scnotifications WITH PASSWORD 'scnotifications';
          CREATE DATABASE sc_notifications OWNER scnotifications;
          GRANT ALL PRIVILEGES ON DATABASE sc_notifications TO scnotifications;
          SQL
          echo "Rewrote postgres/init/01-create-dbs.sql for CI"

      - name: Generate JWT signing keys
        if: steps.token.outputs.have_token == 'true'
        working-directory: infra
        run: |
          if [ -f scripts/gen-jwt-keys.sh ]; then
            bash scripts/gen-jwt-keys.sh
          else
            echo "::warning::gen-jwt-keys.sh not found in infra — skipping; rely on existing secrets/."
          fi
          # openssl creates files with 0600 by default. Identity-service runs as
          # non-root spring user inside its container (Spring Boot OCI default);
          # the bind mount preserves host permissions, so 0600 = AccessDenied.
          # Run 25102230988 had identity crash on
          # `java.nio.file.AccessDeniedException: /run/secrets/private_key.pem`.
          # 0644 keeps owner-write but lets the in-container user read.
          chmod 0644 secrets/jwtRS256.* 2>/dev/null || true
          ls -la secrets/

      - name: Bring up the stack
        if: steps.token.outputs.have_token == 'true'
        working-directory: infra
        run: |
          docker compose -f docker-compose.yml -f docker-compose.services.yml up -d --wait
          docker compose ps

      - name: Generate k6 fixtures
        if: steps.token.outputs.have_token == 'true'
        working-directory: server/services/selection-committee-e2e-tests/load
        run: python3 generate-fixtures.py --count 20

      - name: Mint applicant JWT
        if: steps.token.outputs.have_token == 'true'
        id: jwt
        run: |
          # Bot helper: hits identity-service's test-only mint-token route to
          # provision a JWT for the load run. Replace with your tenant-specific
          # path if the route differs.
          token=$(curl -fsS -X POST "http://localhost:8080/api/v1/auth/test-mint" \
            -H 'Content-Type: application/json' \
            -d '{"role":"APPLICANT","email":"k6-load@test.local"}' \
            | jq -r '.accessToken' || echo "")
          if [ -z "$token" ] || [ "$token" = "null" ]; then
            echo "::warning::Could not mint a load-test JWT. The k6 run will hit the gateway anonymously and may receive 401s; the SLO assertion will still gate."
            token=""
          fi
          echo "::add-mask::$token"
          echo "token=$token" >> "$GITHUB_OUTPUT"

      - name: Run k6 cv-pipeline
        if: steps.token.outputs.have_token == 'true'
        working-directory: server/services/selection-committee-e2e-tests/load
        run: |
          docker run --rm --network=host \
            -v "$PWD:/scripts" \
            -e BASE_URL=http://localhost:8080 \
            -e PROM_URL=http://localhost:9090 \
            -e JWT_TOKEN=${{ steps.jwt.outputs.token }} \
            grafana/k6 run --summary-export=/scripts/k6-summary.json /scripts/cv-pipeline.js
          echo "k6 exit code: $?"

      - name: Capture all service logs on failure
        if: failure() && steps.token.outputs.have_token == 'true'
        working-directory: infra
        run: |
          # Capture every container's stdout/stderr by container name so we get
          # something even if compose-level service-name resolution flakes after
          # `--wait` failure. The previous approach using `docker compose logs <svc>`
          # produced empty logs in run 25101358535 because compose's view of the
          # services differed from the running container set after the failure.
          docker compose -f docker-compose.yml -f docker-compose.services.yml ps -a \
            > stack-ps.log 2>&1 || true
          for cname in sc-cv sc-documents sc-identity sc-environment sc-admission \
                       sc-notifications sc-gateway sc-telegram-bot sc-web; do
            docker logs "$cname" > "${cname}.log" 2>&1 || echo "(no container $cname)" > "${cname}.log"
          done
          # Also dump postgres + rabbitmq for init failures
          docker logs selection-committee-postgres-1 > postgres.log 2>&1 || true
          docker logs selection-committee-rabbitmq-1 > rabbitmq.log 2>&1 || true

      - name: Upload k6 results + logs
        if: always() && steps.token.outputs.have_token == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: cv-load-results
          path: |
            server/services/selection-committee-e2e-tests/load/k6-summary.json
            infra/*.log
          retention-days: 14
          if-no-files-found: ignore

      - name: Compare against baseline
        if: steps.token.outputs.have_token == 'true'
        run: |
          baseline=progress/baselines/cv-load-baseline.json
          summary=server/services/selection-committee-e2e-tests/load/k6-summary.json
          if [ ! -f "$baseline" ] || [ ! -f "$summary" ]; then
            echo "::warning::Baseline or summary missing — skipping regression gate. Update $baseline from this run if results look right."
            exit 0
          fi
          base_p95=$(jq -r '.iteration_duration_p95_ms // empty' "$baseline")
          curr_p95=$(jq -r '.metrics.iteration_duration["p(95)"] // empty' "$summary")
          if [ -z "$base_p95" ] || [ -z "$curr_p95" ]; then
            echo "::warning::Unable to read p95 fields — skipping regression gate."
            exit 0
          fi
          # Fail when current p95 exceeds 110% of baseline.
          if awk "BEGIN { exit !($curr_p95 > $base_p95 * 1.10) }"; then
            echo "::error::cv-load p95 regression: current=${curr_p95}ms baseline=${base_p95}ms (>110%)"
            exit 1
          fi
          echo "p95 OK: current=${curr_p95}ms baseline=${base_p95}ms"

      - name: Tear down the stack
        if: always() && steps.token.outputs.have_token == 'true'
        working-directory: infra
        run: docker compose -f docker-compose.yml -f docker-compose.services.yml down -v
