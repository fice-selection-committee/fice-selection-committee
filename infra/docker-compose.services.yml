services:
  identity-service:
    build:
      context: ../server
      dockerfile: services/selection-committee-identity-service/Dockerfile
    container_name: sc-identity
    restart: unless-stopped
    networks:
      - sc-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      mailpit:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: local
      POSTGRES_HOST: postgres
      PGPORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBIT_USER}
      RABBITMQ_PASSWORD: ${RABBIT_PASS}
      ZIPKIN_URL: http://zipkin:9411/api/v2/spans
      feature-flags-config.env-service-url: http://environment-service:8085
      JWT_PRIVATE_KEY_PATH: /run/secrets/private_key.pem
      JWT_PUBLIC_KEY_PATH: /run/secrets/public_key.pem
      spring.mail.host: mailpit
      spring.mail.port: 1025
      security.rate-limit.endpoints[0].path: /api/v1/auth/magic-link
      security.rate-limit.endpoints[0].max-attempts: 100
      security.rate-limit.endpoints[0].window-seconds: 60
      security.rate-limit.endpoints[1].path: /api/v1/auth/verify-magic-link
      security.rate-limit.endpoints[1].max-attempts: 100
      security.rate-limit.endpoints[1].window-seconds: 60
    volumes:
      - ./secrets/jwtRS256.pk8.pem:/run/secrets/private_key.pem:ro
      - ./secrets/jwtRS256.key.pub:/run/secrets/public_key.pem:ro
    ports:
      - "${IDENTITY_SERVICE_PORT:-8081}:8081"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8081/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  environment-service:
    build:
      context: ../server
      dockerfile: services/selection-committee-environment-service/Dockerfile
    container_name: sc-environment
    restart: unless-stopped
    networks:
      - sc-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      identity-service:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: local
      POSTGRES_HOST: postgres
      PGPORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBIT_USER}
      RABBITMQ_PASSWORD: ${RABBIT_PASS}
      ENVIRONMENT_SERVICE_PORT: 8085
      IDENTITY_SERVICE_URL: http://identity-service:8081
      ZIPKIN_URL: http://zipkin:9411/api/v2/spans
      spring.datasource.url: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
    ports:
      - "${ENVIRONMENT_SERVICE_PORT:-8085}:8085"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8085/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  admission-service:
    build:
      context: ../server
      dockerfile: services/selection-committee-admission-service/Dockerfile
    container_name: sc-admission
    restart: unless-stopped
    networks:
      - sc-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      identity-service:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: local
      POSTGRES_HOST: postgres
      PGPORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBIT_USER}
      RABBITMQ_PASSWORD: ${RABBIT_PASS}
      IDENTITY_SERVICE_URL: http://identity-service:8081
      service.identity-service-url: http://identity-service:8081
      service.documents-service-url: http://documents-service:8084
      sc.auth.identity-service-url: http://identity-service:8081
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      ZIPKIN_URL: http://zipkin:9411/api/v2/spans
    ports:
      - "${ADMISSION_SERVICE_PORT:-8083}:8083"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8083/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  documents-service:
    build:
      context: ../server
      dockerfile: services/selection-committee-documents-service/Dockerfile
    container_name: sc-documents
    restart: unless-stopped
    networks:
      - sc-net
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      identity-service:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: local
      POSTGRES_HOST: postgres
      PGPORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBIT_USER}
      RABBITMQ_PASSWORD: ${RABBIT_PASS}
      MINIO_INTERNAL_ENDPOINT: http://minio:9000
      MINIO_EXTERNAL_ENDPOINT: http://localhost:${MINIO_PORT:-9000}
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
      service.identity-service-url: http://identity-service:8081
      service.admission-service-url: http://admission-service:8083
      sc.auth.identity-service-url: http://identity-service:8081
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      ZIPKIN_URL: http://zipkin:9411/api/v2/spans
      spring.datasource.url: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
    ports:
      - "${DOCUMENTS_SERVICE_PORT:-8084}:8084"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8084/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  notifications-service:
    build:
      context: ../server
      dockerfile: services/selection-committee-notifications-service/Dockerfile
    container_name: sc-notifications
    restart: unless-stopped
    networks:
      - sc-net
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      mailpit:
        condition: service_started
      identity-service:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: local
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${NOTIF_DB:-sc_notifications}
      POSTGRES_USER: ${NOTIF_USER:-scnotifications}
      POSTGRES_PASSWORD: ${NOTIF_PASS:-scnotifications}
      PGPORT: 5432
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBIT_USER}
      RABBITMQ_PASSWORD: ${RABBIT_PASS}
      MAIL_USER_EMAIL: test@localhost
      MAIL_PASSWORD: test
      spring.mail.host: mailpit
      spring.mail.port: 1025
      spring.mail.properties.mail.smtp.auth: "false"
      spring.mail.properties.mail.smtp.starttls.enable: "false"
      IDENTITY_SERVICE_HOST: identity-service
      IDENTITY_SERVICE_PORT: 8081
      ZIPKIN_URL: http://zipkin:9411/api/v2/spans
    ports:
      - "${NOTIFICATIONS_SERVICE_PORT:-8086}:8086"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8086/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 45s

  gateway:
    build:
      context: ../server
      dockerfile: services/selection-committee-gateway/Dockerfile
    container_name: sc-gateway
    restart: unless-stopped
    networks:
      - sc-net
    depends_on:
      redis:
        condition: service_healthy
      identity-service:
        condition: service_healthy
      admission-service:
        condition: service_healthy
      documents-service:
        condition: service_healthy
      environment-service:
        condition: service_healthy
      notifications-service:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: local
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      IDENTITY_SERVICE_HOST: identity-service
      IDENTITY_SERVICE_PORT: 8081
      ADMISSION_SERVICE_HOST: admission-service
      ADMISSION_SERVICE_PORT: 8083
      DOCUMENTS_SERVICE_HOST: documents-service
      DOCUMENTS_SERVICE_PORT: 8084
      ENVIRONMENT_SERVICE_HOST: environment-service
      ENVIRONMENT_SERVICE_PORT: 8085
      NOTIFICATIONS_SERVICE_HOST: notifications-service
      NOTIFICATIONS_SERVICE_PORT: 8086
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      ZIPKIN_URL: http://zipkin:9411/api/v2/spans
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8079/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  web:
    build:
      context: ../client/web
      dockerfile: docker/Dockerfile
    container_name: sc-web
    restart: unless-stopped
    networks:
      - sc-net
    depends_on:
      gateway:
        condition: service_healthy
    environment:
      API_PROXY_TARGET: http://gateway:8080
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  telegram-bot-service:
    build:
      context: ../server
      dockerfile: services/selection-committee-telegram-bot-service/Dockerfile
    container_name: sc-telegram-bot
    restart: unless-stopped
    networks:
      - sc-net
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: local
      POSTGRES_HOST: postgres
      PGPORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBIT_USER}
      RABBITMQ_PASSWORD: ${RABBIT_PASS}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_ENABLED: ${TELEGRAM_ENABLED:-false}
      TELEGRAM_ALLOWED_CHAT_IDS: ${TELEGRAM_ALLOWED_CHAT_IDS:-}
      ENVIRONMENT_SERVICE_URL: http://environment-service:8085
      ZIPKIN_URL: http://zipkin:9411/api/v2/spans
    ports:
      - "${TELEGRAM_BOT_SERVICE_PORT:-8087}:8087"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8087/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Computer Vision Service (Python + FastAPI + PaddleOCR) ──
  # Internal-only event-driven OCR microservice. Stateless, no DB, no
  # gateway route. Consumes cv.document.requested from RabbitMQ and
  # publishes cv.document.parsed / cv.document.failed back to documents-
  # service. Port 8088 is the operational surface (/health + /metrics);
  # exposed to the host only for local debugging.
  cv-service:
    build:
      context: ../server/services/selection-committee-computer-vision
      dockerfile: Dockerfile
    container_name: sc-cv
    restart: unless-stopped
    networks:
      - sc-net
    depends_on:
      rabbitmq:
        condition: service_healthy
      # MinIO itself has no healthcheck; minio-init's successful exit is
      # the strongest readiness signal we have (bucket exists, CORS set).
      # Matches the pattern used by documents-service.
      minio-init:
        condition: service_completed_successfully
    environment:
      CV_SERVICE_PORT: ${CV_SERVICE_PORT:-8088}
      CV_LOG_LEVEL: ${CV_LOG_LEVEL:-INFO}
      CV_OCR_LANGS: ${CV_OCR_LANGS:-ukr,en}
      CV_RABBIT_PREFETCH: ${CV_RABBIT_PREFETCH:-8}
      CV_RABBITMQ_URL: amqp://${RABBIT_USER}:${RABBIT_PASS}@rabbitmq:5672/
      CV_MINIO_ENDPOINT: http://minio:9000
      CV_MINIO_BUCKET: ${MINIO_BUCKET}
      CV_ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
    ports:
      - "${CV_SERVICE_PORT:-8088}:8088"
    healthcheck:
      # GET probe (FastAPI /health is GET-only, --spider's HEAD would 405).
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8088/health > /dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ── Telegram Bot Webhook (ngrok tunnel + auto-registration) ──
  ngrok:
    image: ngrok/ngrok:latest
    container_name: sc-ngrok
    restart: unless-stopped
    networks:
      - sc-net
    depends_on:
      telegram-bot-service:
        condition: service_healthy
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN:-}
    command: ["http", "sc-telegram-bot:8087", "--log=stdout"]
    ports:
      - "4040:4040"
    profiles:
      - telegram

  telegram-webhook-init:
    image: curlimages/curl:latest
    container_name: sc-telegram-webhook-init
    networks:
      - sc-net
    depends_on:
      ngrok:
        condition: service_started
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Waiting for ngrok tunnel..."
        for i in $$(seq 1 30); do
          URL=$$(curl -s http://ngrok:4040/api/tunnels 2>/dev/null | grep -o '"public_url":"https://[^"]*"' | head -1 | cut -d'"' -f4)
          if [ -n "$$URL" ]; then
            echo "ngrok tunnel: $$URL"
            RESULT=$$(curl -s "https://api.telegram.org/bot$${TELEGRAM_BOT_TOKEN}/setWebhook?url=$${URL}/api/v1/telegram/webhook")
            echo "Webhook registration: $$RESULT"
            exit 0
          fi
          echo "  attempt $$i/30 — tunnel not ready yet"
          sleep 2
        done
        echo "ERROR: ngrok tunnel not available after 60s"
        exit 1
    profiles:
      - telegram

networks:
  sc-net: {}
