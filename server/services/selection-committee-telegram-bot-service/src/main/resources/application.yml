spring:
  main:
    allow-bean-definition-overriding: true
  application:
    name: telegram-bot-service

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${PGPORT:5432}/${POSTGRES_DB:selection-committee}
    username: ${POSTGRES_USER:scadmin}
    password: ${POSTGRES_PASSWORD:scadminpass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: telegram_bot
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    create-schemas: true
    schemas: telegram_bot
    default-schema: telegram_bot
    enabled: true
    locations: classpath:db/migration

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:scrabbit}
    password: ${RABBITMQ_PASSWORD:}
    virtual-host: /
    listener:
      simple:
        missing-queues-fatal: false
        default-requeue-rejected: false
        retry:
          enabled: true
          initial-interval: 3s
          max-attempts: 3

telegram:
  bot:
    token: ${TELEGRAM_BOT_TOKEN:}
    enabled: ${TELEGRAM_ENABLED:false}
    allowed-chat-ids: ${TELEGRAM_ALLOWED_CHAT_IDS:}
  rate-limit:
    max-requests-per-second: 5

feature-flags:
  env-service-url: ${ENVIRONMENT_SERVICE_URL:http://localhost:8085}

bot:
  health-check:
    timeout-ms: 2000

resilience4j:
  circuitbreaker:
    instances:
      environmentService:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
        slidingWindowType: COUNT_BASED

server:
  port: ${TELEGRAM_BOT_SERVICE_PORT:8087}
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_URL:http://localhost:9411/api/v2/spans}
