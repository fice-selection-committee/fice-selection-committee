# Performance SLA & Thresholds -- FICE Selection Committee Backend
# version: 1.0.0
# last_updated: 2026-03-24

peak_concurrent_users: 200
operator_count: 20

response_time_sla:

  auth_login:
    p95_ms: 500
    p99_ms: 1000
    description: POST /api/v1/auth/login -- RSA-256 sign + bcrypt + DB write

  auth_register:
    p95_ms: 800
    p99_ms: 1500

  token_validate_in_process:
    p95_ms: 10
    p99_ms: 20
    description: AccessTokenFilter JWT validation, no DB call on happy path

  application_create:
    p95_ms: 1000
    p99_ms: 2000
    description: POST /api/v1/admissions -- single INSERT + ownership check

  application_list_paginated:
    p95_ms: 600
    p99_ms: 1000
    description: GET /api/v1/admissions -- SELECT with optional spec filter, must use index scan

  application_submit:
    p95_ms: 2000
    p99_ms: 3500
    description: PUT /api/v1/admissions/{id}/submit -- cross-service Feign call to documents-service

  application_accept:
    p95_ms: 800
    p99_ms: 1500
    description: PUT /api/v1/admissions/{id}/accept -- DB UPDATE + RabbitMQ event publish

  order_sign_50_apps:
    p95_ms: 5000
    p99_ms: 8000
    description: PUT /api/v1/orders/{id}/sign -- batch TX 50 rows + 50 RabbitMQ events

  document_metadata_create:
    p95_ms: 1000
    p99_ms: 2000
    description: POST /api/v1/documents/metadata -- MinIO list+delete+insert + presign

  presigned_url_generate:
    p95_ms: 300
    p99_ms: 600
    description: GET /api/v1/documents/{id}/presign-upload -- DB lookup + S3 presign only

  document_upload_10mb_to_minio:
    p95_ms: 30000
    p99_ms: 60000
    description: PUT to MinIO presigned URL with 10 MB payload (infra-dependent)

  feature_flag_cached:
    p95_ms: 50
    p99_ms: 100
    description: GET /api/v1/feature-flags -- Redis cache hit, must be sub-100ms

  feature_flag_cache_miss:
    p95_ms: 300
    p99_ms: 500
    description: GET /api/v1/feature-flags -- DB query after cache eviction

throughput_sla:

  login_rps_minimum: 40
  application_create_rps_minimum: 20
  document_metadata_rps_minimum: 30
  feature_flag_rps_minimum: 200
  auto_assign_apps_per_30s_minimum: 100

error_rate_sla:

  default_max_pct: 1.0
  document_upload_max_pct: 3.0
  note: >
    4xx (validation errors, 409 conflicts) are NOT counted as errors.
    Only HTTP 5xx responses count.

infrastructure_sla:

  redis:
    max_pending_connections: 10
    max_pool_timeouts: 0
    description: Jedis pool max-active=10; any timeout is a P1 defect

  rabbitmq:
    max_queue_depth: 500
    max_dlq_messages: 0
    description: audit.audit-ingest queue must not exceed 500 messages; DLQ must stay empty

  postgres:
    max_pending_hikari_acquisitions: 10
    max_hikari_timeout_events: 0
    description: HikariCP default max-pool-size=10 per service

  minio:
    min_throughput_mbps: 50
    max_upload_error_rate_pct: 3.0

jmh_baselines:

  ContractNumberGeneratorBenchmark:
    generateBudgetContractNumber_ops_per_sec: 5000
    note: against real PostgreSQL expect 500-2000 ops/s due to network RTT

  PdfGenerationBenchmark:
    thymeleafRenderOnly_avg_ms: 2
    pdfFromHtml_avg_ms: 150
    fullPipeline_avg_ms: 200
    note: if fullPipeline exceeds 200ms avg consider async PDF generation

  JwtBenchmark:
    generateAccessToken_ops_per_sec: 2000
    validateAccessToken_ops_per_sec: 5000
    sha256HexToken_ops_per_sec: 500000
    note: RSA-2048; breaching generateAccessToken<1000 means KeyLoader not caching key

  ApplicationSpecificationBenchmark:
    buildFullFilter_ops_per_sec: 1000000
    note: pure in-memory predicate -- regressions indicate accidental I/O
