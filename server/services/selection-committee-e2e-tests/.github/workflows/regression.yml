name: E2E Regression Tests

on:
  workflow_dispatch:
    inputs:
      suite:
        description: "Test suite to run"
        required: true
        default: all
        type: choice
        options:
          - smoke
          - all
      caller_event:
        description: "Internal: event name from calling workflow"
        required: false
        default: ""
        type: string

  workflow_call:
    inputs:
      suite:
        type: string
        required: true
        default: all
      caller_event:
        type: string
        required: false
        default: ""

concurrency:
  group: e2e-regression-${{ inputs.caller_event == 'schedule' && 'nightly' || github.run_id }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: read

jobs:
  e2e:
    name: E2E Tests (${{ inputs.suite }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run E2E tests
        id: e2e-tests
        continue-on-error: true
        run: |
          if [ "${{ inputs.suite }}" = "smoke" ]; then
            ./gradlew test -PincludeTags=smoke --no-daemon
          else
            ./gradlew test --no-daemon
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: build/test-results/
          retention-days: 14
          if-no-files-found: ignore

      - name: Telegram notification
        if: always()
        run: |
          GITHUB_RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          PASSED=0; FAILED=0; SKIPPED=0; TOTAL=0
          for f in build/test-results/test/TEST-*.xml; do
            [[ -f "$f" ]] || continue
            T=$(grep -oP 'tests="\K[0-9]+' "$f" | head -1); T=${T:-0}
            F=$(grep -oP 'failures="\K[0-9]+' "$f" | head -1); F=${F:-0}
            E=$(grep -oP 'errors="\K[0-9]+' "$f" | head -1); E=${E:-0}
            S=$(grep -oP 'skipped="\K[0-9]+' "$f" | head -1); S=${S:-0}
            PASSED=$((PASSED + T - F - E - S))
            FAILED=$((FAILED + F + E))
            SKIPPED=$((SKIPPED + S))
          done
          TOTAL=$((PASSED + FAILED + SKIPPED))

          SUITE_NAME="${{ inputs.suite }}"
          SUITE_DISPLAY="${SUITE_NAME^}"

          if [[ $TOTAL -eq 0 ]]; then
            STATUS="BROKEN"; STATUS_ICON="рЯЯ°"
          elif [[ $FAILED -gt 0 ]]; then
            STATUS="FAILED"; STATUS_ICON="рЯФі"
          else
            STATUS="PASSED"; STATUS_ICON="рЯЯҐ"
          fi

          if [[ $TOTAL -gt 0 ]]; then
            PASS_RATE=$((PASSED * 100 / TOTAL))
            FILLED=$((PASS_RATE / 5))
          else
            PASS_RATE=0; FILLED=0
          fi
          EMPTY=$((20 - FILLED))
          BAR=$(printf 'вЦИ%.0s' $(seq 1 $FILLED 2>/dev/null))$(printf 'вЦС%.0s' $(seq 1 $EMPTY 2>/dev/null))

          ACTOR="${{ github.triggering_actor }}"
          CALLER_EVENT="${{ inputs.caller_event }}"
          EVENT="${{ github.event_name }}"
          if [[ "$EVENT" == "schedule" || "$CALLER_EVENT" == "schedule" ]]; then
            LAUNCHED_BY="рЯС§ <b>Launched by:</b> scheduled (nightly)"
          else
            LAUNCHED_BY="рЯС§ <b>Launched by:</b> <a href=\"https://github.com/${ACTOR}\">@${ACTOR}</a>"
          fi

          MESSAGE="вЄївЄївЄївЄївЄї
          <b>SC FICE E2E ${SUITE_DISPLAY} вАФ ${STATUS} ${STATUS_ICON}</b>

          <code>${BAR}</code>  ${PASS_RATE}% (${PASSED}/${TOTAL})

          <b>Suite:</b> ${SUITE_NAME}
          вЄївЄївЄївЄївЄї
          вЬЕ   Passed: <b>${PASSED}</b>
          вЫФпЄП   Failed: <b>${FAILED}</b>
          вП≠пЄП   Skipped: <b>${SKIPPED}</b>

          вАФ <b>Total tests executed</b>: ${TOTAL}
          вЄївЄївЄївЄївЄї
          рЯФЧ <a href=\"${GITHUB_RUN_URL}\">GitHub Run</a>

          ${LAUNCHED_BY}
          вЄївЄївЄївЄївЄї"

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d message_thread_id="${TELEGRAM_TOPIC_ID}" \
            -d parse_mode="HTML" \
            -d disable_web_page_preview="true" \
            --data-urlencode "text=${MESSAGE}" || echo "::warning::Telegram notification failed"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_TOPIC_ID: ${{ secrets.TELEGRAM_TOPIC_ID }}

      - name: Determine final outcome
        if: always()
        run: |
          if [[ "${{ steps.e2e-tests.outcome }}" == "failure" ]]; then
            echo "E2E tests failed"
            exit 1
          fi
