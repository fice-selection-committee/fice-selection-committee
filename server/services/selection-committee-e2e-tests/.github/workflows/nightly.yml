name: Nightly E2E Regression

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

concurrency:
  group: nightly-e2e-regression
  cancel-in-progress: false

permissions:
  contents: read
  actions: read

jobs:
  nightly:
    uses: ./.github/workflows/regression.yml
    with:
      suite: all
      caller_event: ${{ github.event_name }}
    secrets: inherit
